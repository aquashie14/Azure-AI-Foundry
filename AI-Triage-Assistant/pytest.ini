[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*

minversion = 7.0

addopts = 
    -v
    --strict-markers
    --tb=short

markers =
    security: Security-related tests (API key redaction, secret handling)
    integration: Integration tests requiring external services
    unit: Unit tests with no external dependencies

testpaths = tests
