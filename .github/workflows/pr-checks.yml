name: PR Checks

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/**"
  push:
    branches-ignore: [main]
    paths:
      - "infra/**"
      - ".github/workflows/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  # Azure OIDC authentication — used only by the plan job
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC:        "true"

  # Terraform variables
  TF_VAR_resource_prefix:   "aqsh"
  TF_VAR_environment:       "dev"
  TF_VAR_location:          "uksouth"
  TF_VAR_deploy_model:      "false"
  TF_VAR_ai_model_name:     "gpt-4o-mini"
  TF_VAR_ai_model_version:  "2024-07-18"
  TF_VAR_ai_model_capacity: "10"
  TF_VAR_workload:          "email-triage-assistant"
  TF_VAR_owner:             ${{ secrets.TF_VAR_OWNER }}
  TF_VAR_cost_centre:       ${{ secrets.TF_VAR_COST_CENTRE }}

jobs:
  # ── Runs on every branch push and every PR — no Azure auth needed ─────────
  static-checks:
    name: Static checks (fmt / validate / tfsec)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      # ── Format ───────────────────────────────────────────────────────────
      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check -recursive

      # ── Init (no backend — no Azure credentials required) ────────────────
      - name: Terraform init
        id: init
        run: terraform init -backend=false

      # ── Validate ─────────────────────────────────────────────────────────
      - name: Terraform validate
        id: validate
        run: terraform validate

      # ── Security scan ─────────────────────────────────────────────────────
      - name: tfsec security scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra
          soft_fail: true
          github_token: ${{ github.token }}

  # ── Runs only on PRs — uses environment:dev so OIDC subject matches the  ──
  # ── existing federated credential (same one apply-dev uses).             ──
  plan:
    name: Terraform plan
    if: github.event_name == 'pull_request'
    needs: static-checks
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      # ── Initialise with remote backend ────────────────────────────────────
      - name: Terraform init
        id: init
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"

      # ── Plan ─────────────────────────────────────────────────────────────
      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      # ── Post plan output as PR comment ────────────────────────────────────
      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `
            #### Terraform Init: \`${{ steps.init.outcome }}\`
            #### Terraform Plan: \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      # ── Fail if plan failed ───────────────────────────────────────────────
      - name: Check plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1
